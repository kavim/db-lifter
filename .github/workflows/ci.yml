name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test -race ./...

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags "-s -w" -o /tmp/db-lift ./cmd/db-lift

      - name: Version flag
        run: /tmp/db-lift --version
